version: '3.9'

services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      APP_ENV: production
      HTTP_PORT: 8080
      POSTGRES_DSN: postgres://postgres:postgres@postgres:5432/trading?sslmode=disable
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ""
      REDIS_DB: 0
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: gpt-4.1-mini
      BINANCE_WS_URL: wss://stream.binance.com:9443/ws/btcusdt@trade
      PRICE_STREAM_SYMBOL: BTCUSDT
      RATE_LIMIT_RPS: 10
      RATE_LIMIT_BURST: 20
      SHUTDOWN_TIMEOUT: 10s
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: trading
    ports:
      - "5433:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:8-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  pg_data:
  redis_data:
